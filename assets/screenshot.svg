<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <style>
      .mono { font-family: Cascadia Code, Consolas, Courier New, monospace; }
      .dim { opacity: 0.35; }
      .muted { opacity: 0.5; }
    </style>
  </defs>

  <!-- Window background -->
  <rect width="1280" height="800" rx="8" ry="8" fill="#0d1117"/>

  <!-- ===== TOOLBAR ===== -->
  <rect x="0" y="0" width="1280" height="38" rx="8" ry="8" fill="#0d1117"/>
  <!-- brand -->
  <text x="16" y="24" fill="#58a6ff" font-size="13" font-weight="600" letter-spacing="0.5">mod-term</text>

  <!-- toolbar buttons -->
  <g fill="none" font-size="12">
    <text x="110" y="24" fill="rgba(201,209,217,0.5)">+ Terminal</text>
    <text x="195" y="24" fill="rgba(201,209,217,0.5)">Split &#9707;</text>
    <text x="260" y="24" fill="rgba(201,209,217,0.5)">Split &#9707;&#8595;</text>
    <text x="340" y="24" fill="rgba(201,209,217,0.5)">Close pane</text>

    <text x="450" y="24" fill="rgba(201,209,217,0.5)">Workspaces</text>
    <text x="545" y="24" fill="rgba(201,209,217,0.5)">Save workspace</text>

    <!-- right side -->
    <text x="1050" y="24" fill="rgba(201,209,217,0.35)" font-size="11">Theme</text>
    <rect x="1088" y="11" width="90" height="20" rx="4" fill="none" stroke="rgba(255,255,255,0.08)"/>
    <text x="1098" y="25" fill="rgba(201,209,217,0.5)" font-size="12">Dracula</text>
    <text x="1190" y="24" fill="rgba(201,209,217,0.5)">Settings</text>

    <!-- window controls -->
    <text x="1240" y="25" fill="rgba(201,209,217,0.4)" font-size="14" text-anchor="middle">&#x2013;</text>
    <text x="1258" y="25" fill="rgba(201,209,217,0.4)" font-size="12" text-anchor="middle">&#x25A1;</text>
    <text x="1274" y="25" fill="rgba(201,209,217,0.4)" font-size="12" text-anchor="middle">&#x2715;</text>
  </g>

  <!-- ===== PANE LAYOUT: 2 columns, left has 2 rows, right has 2 rows ===== -->

  <!-- LEFT TOP PANE (active) -->
  <rect x="1" y="39" width="639" height="379" fill="#0d1117" stroke="rgba(255,255,255,0.12)"/>
  <!-- header -->
  <rect x="1" y="39" width="639" height="22" fill="#161b22"/>
  <text x="12" y="55" fill="#c9d1d9" font-size="12" font-weight="500">api server</text>
  <text x="590" y="55" fill="#c9d1d9" class="dim" font-size="13">&#x29D6;</text>
  <text x="610" y="55" fill="#c9d1d9" class="dim" font-size="13">&#x2699;</text>
  <text x="625" y="55" fill="#c9d1d9" class="dim" font-size="10">a1f2</text>
  <!-- terminal content -->
  <g class="mono" font-size="13" fill="#c9d1d9">
    <text x="12" y="82" fill="#3fb950">~\projects\api</text>
    <text x="12" y="100" fill="#58a6ff">PS&gt;</text><text x="48" y="100"> npm start</text>
    <text x="12" y="120" fill="#c9d1d9" opacity="0.8">> api@2.1.0 start</text>
    <text x="12" y="140" fill="#c9d1d9" opacity="0.8">> node server.js</text>
    <text x="12" y="168" fill="#3fb950">[server]</text><text x="85" y="168"> Listening on port 3000</text>
    <text x="12" y="188" fill="#3fb950">[server]</text><text x="85" y="188"> Connected to database</text>
    <text x="12" y="208" fill="#3fb950">[server]</text><text x="85" y="208"> Ready in 1.2s</text>
    <text x="12" y="236" fill="#d29922">[request]</text><text x="100" y="236"> GET /api/health 200 12ms</text>
    <text x="12" y="256" fill="#d29922">[request]</text><text x="100" y="256"> GET /api/users 200 45ms</text>
    <text x="12" y="276" fill="#d29922">[request]</text><text x="100" y="276"> POST /api/auth/login 200 120ms</text>
    <text x="12" y="304" fill="#58a6ff">PS&gt;</text><text x="48" y="304" fill="#c9d1d9"> _</text>
  </g>

  <!-- LEFT BOTTOM PANE -->
  <rect x="1" y="420" width="639" height="379" fill="#0d1117" stroke="rgba(255,255,255,0.05)"/>
  <!-- header with activity dot -->
  <rect x="1" y="420" width="639" height="22" fill="#161b22"/>
  <!-- activity dot -->
  <circle cx="14" cy="432" r="3" fill="#58a6ff"/>
  <text x="22" y="436" fill="#c9d1d9" font-size="12" font-weight="500">build watcher</text>
  <text x="590" y="436" fill="#c9d1d9" class="dim" font-size="13">&#x29D6;</text>
  <text x="610" y="436" fill="#c9d1d9" class="dim" font-size="13">&#x2699;</text>
  <text x="625" y="436" fill="#c9d1d9" class="dim" font-size="10">b3e4</text>
  <!-- terminal content -->
  <g class="mono" font-size="13" fill="#c9d1d9">
    <text x="12" y="462" fill="#58a6ff">PS&gt;</text><text x="48" y="462"> npm run watch</text>
    <text x="12" y="482" fill="#c9d1d9" opacity="0.8">> web@1.0.0 watch</text>
    <text x="12" y="502" fill="#c9d1d9" opacity="0.8">> vite build --watch</text>
    <text x="12" y="530" fill="#39c5cf">[vite]</text><text x="65" y="530"> watching for changes...</text>
    <text x="12" y="558" fill="#3fb950">[vite]</text><text x="65" y="558"> build completed in 340ms</text>
    <text x="12" y="578" fill="#39c5cf">[vite]</text><text x="65" y="578"> 14 modules transformed</text>
    <text x="12" y="606" fill="#d29922">[vite]</text><text x="65" y="606"> file changed: src/App.tsx</text>
    <text x="12" y="626" fill="#3fb950">[vite]</text><text x="65" y="626"> rebuild completed in 120ms</text>
    <text x="12" y="654" fill="#d29922">[vite]</text><text x="65" y="654"> file changed: src/utils.ts</text>
    <text x="12" y="674" fill="#3fb950">[vite]</text><text x="65" y="674"> rebuild completed in 95ms</text>
  </g>

  <!-- RIGHT TOP PANE with scrollback panel -->
  <rect x="642" y="39" width="637" height="379" fill="#0d1117" stroke="rgba(255,255,255,0.05)"/>
  <!-- header -->
  <rect x="642" y="39" width="637" height="22" fill="#161b22"/>
  <text x="654" y="55" fill="#c9d1d9" font-size="12" font-weight="500">web frontend</text>
  <text x="1230" y="55" fill="#c9d1d9" class="dim" font-size="13">&#x29D6;</text>
  <text x="1250" y="55" fill="#c9d1d9" class="dim" font-size="13">&#x2699;</text>
  <text x="1265" y="55" fill="#c9d1d9" class="dim" font-size="10">c5f6</text>

  <!-- scrollback panel -->
  <rect x="642" y="61" width="637" height="100" fill="rgba(0,0,0,0.3)"/>
  <line x1="642" y1="161" x2="1279" y2="161" stroke="rgba(255,255,255,0.06)"/>
  <text x="654" y="77" fill="#c9d1d9" opacity="0.4" font-size="10" font-style="italic">previous session</text>
  <g class="mono" font-size="11" fill="#c9d1d9" opacity="0.35">
    <text x="654" y="95">PS ~\projects\web> npm run dev</text>
    <text x="654" y="110">> web@1.0.0 dev</text>
    <text x="654" y="125">> vite</text>
    <text x="654" y="145">  VITE v5.2.0  ready in 450ms</text>
    <text x="654" y="155">  Local:   http://localhost:5173/</text>
  </g>

  <!-- terminal content below scrollback -->
  <g class="mono" font-size="13" fill="#c9d1d9">
    <text x="654" y="184" fill="#3fb950">~\projects\web</text>
    <text x="654" y="204" fill="#58a6ff">PS&gt;</text><text x="690" y="204"> npm run dev</text>
    <text x="654" y="224" opacity="0.8">> web@1.0.0 dev</text>
    <text x="654" y="244" opacity="0.8">> vite</text>
    <text x="654" y="272" fill="#3fb950">  VITE v5.2.0</text><text x="790" y="272">  ready in 380ms</text>
    <text x="654" y="292">  Local:   </text><text x="740" y="292" fill="#58a6ff">http://localhost:5173/</text>
    <text x="654" y="312">  Network: </text><text x="740" y="312" fill="#58a6ff">http://192.168.1.42:5173/</text>
    <text x="654" y="340" fill="#d29922">  hmr update /src/App.tsx 12ms</text>
    <text x="654" y="360" fill="#d29922">  hmr update /src/index.css 4ms</text>
  </g>

  <!-- RIGHT BOTTOM PANE -->
  <rect x="642" y="420" width="637" height="379" fill="#0d1117" stroke="rgba(255,255,255,0.05)"/>
  <!-- header -->
  <rect x="642" y="420" width="637" height="22" fill="#161b22"/>
  <text x="654" y="436" fill="#c9d1d9" font-size="12" font-weight="500">git / scratch</text>
  <text x="1230" y="436" fill="#c9d1d9" class="dim" font-size="13">&#x29D6;</text>
  <text x="1250" y="436" fill="#c9d1d9" class="dim" font-size="13">&#x2699;</text>
  <text x="1265" y="436" fill="#c9d1d9" class="dim" font-size="10">d7g8</text>
  <!-- terminal content -->
  <g class="mono" font-size="13" fill="#c9d1d9">
    <text x="654" y="462" fill="#58a6ff">PS&gt;</text><text x="690" y="462"> git status</text>
    <text x="654" y="482">On branch </text><text x="740" y="482" fill="#3fb950">main</text>
    <text x="654" y="502">Your branch is up to date with 'origin/main'.</text>
    <text x="654" y="530">Changes not staged for commit:</text>
    <text x="670" y="550" fill="#ff7b72">modified:   src/renderer/renderer.js</text>
    <text x="670" y="570" fill="#ff7b72">modified:   src/renderer/styles.css</text>
    <text x="670" y="590" fill="#ff7b72">modified:   src/main/settings.js</text>
    <text x="654" y="618">Untracked files:</text>
    <text x="670" y="638" fill="#3fb950">themes/tokyo-night.json</text>
    <text x="670" y="658" fill="#3fb950">themes/synthwave.json</text>
    <text x="654" y="686" fill="#58a6ff">PS&gt;</text><text x="690" y="686" fill="#c9d1d9"> _</text>
  </g>

  <!-- Splitter lines (subtle) -->
  <line x1="640" y1="39" x2="640" y2="800" stroke="rgba(255,255,255,0.04)" stroke-width="2"/>
  <line x1="1" y1="419" x2="640" y2="419" stroke="rgba(255,255,255,0.04)" stroke-width="2"/>
  <line x1="642" y1="419" x2="1280" y2="419" stroke="rgba(255,255,255,0.04)" stroke-width="2"/>
</svg>
